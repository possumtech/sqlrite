name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm test
      - run: npm publish --provenance --access public
